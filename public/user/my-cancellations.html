    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Search Toggle (Inline)
            const searchTrigger = document.getElementById('search-trigger');
            const searchForm = document.getElementById('search-form-inline');
            const searchInput = searchForm.querySelector('input');

            if (searchTrigger && searchForm) {
                searchTrigger.addEventListener('click', function (e) {
                    e.preventDefault();
                    searchForm.classList.toggle('active');
                    if (searchForm.classList.contains('active')) {
                        setTimeout(() => searchInput.focus(), 100);
                    }
                });

                // Close when clicking outside
                document.addEventListener('click', function (e) {
                    if (!searchForm.contains(e.target) && !searchTrigger.contains(e.target)) {
                        searchForm.classList.remove('active');
                    }
                });
            }
        });
    </script>

    <script>
        async function loadUserInfo() {
            try {
                let res = await fetch("/api/auth/me", { credentials: "include" });

                if (res.status === 401) {
                    const refreshRes = await fetch("/api/auth/refresh", { method: "POST", credentials: "include" });
                    if (!refreshRes.ok) { window.location.href = "login.html"; return; }
                    res = await fetch("/api/auth/me", { credentials: "include" });
                }

                if (!res.ok) { window.location.href = "login.html"; return; }
                const user = await res.json();

                document.getElementById('sidebarUserName').textContent = user.name;
                document.getElementById('sidebarUserEmail').textContent = user.email;
                document.getElementById('sidebarUserAvatar').textContent = user.name.charAt(0).toUpperCase();
            } catch (err) {
                console.error(err);
                window.location.href = "login.html";
            }
        }

        const logoutBtn = document.getElementById("sidebarLogoutBtn");
        if (logoutBtn) {
            logoutBtn.addEventListener("click", async function (e) {
                e.preventDefault();
                await fetch("/api/auth/logout", { method: "POST" });
                localStorage.removeItem("isLoggedIn");
                window.location.href = "home.html";
            });
        }

        async function loadCancellations() {
            try {
                let res = await fetch("/api/orders/my-orders", { credentials: "include" });

                if (res.status === 401) {
                    const refreshRes = await fetch("/api/auth/refresh", { method: "POST", credentials: "include" });
                    if (!refreshRes.ok) { window.location.href = "login.html"; return; }
                    res = await fetch("/api/orders/my-orders", { credentials: "include" });
                }

                if (!res.ok) { window.location.href = "login.html"; return; }

                const allOrders = await res.json();
                const cancelledOrders = allOrders.filter(o => o.orderStatus === "Cancelled");

                const tbody = document.getElementById("cancellationsTableBody");
                tbody.innerHTML = "";

                if (cancelledOrders.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-muted">No cancelled orders</td></tr>`;
                    return;
                }

                cancelledOrders.forEach(order => {
                    const date = new Date(order.createdAt).toLocaleDateString("en-IN");
                    const reason = order.cancellationReason || "Cancelled by user";

                    let statusBadge = `<span class="badge bg-secondary">N/A</span>`;
                    let refundAmt = "₹0";

                    if (order.paymentMethod !== "COD") {
                        refundAmt = `₹${order.totalAmount.toLocaleString("en-IN")}`;
                        if (order.paymentStatus === "Refunded") {
                            statusBadge = `<span class="badge bg-success">Refunded</span>`;
                        } else {
                            statusBadge = `<span class="badge bg-warning text-dark">Pending</span>`;
                        }
                    } else {
                        statusBadge = `<span class="badge bg-light text-muted border">No Refund (COD)</span>`;
                    }

                    const row = document.createElement("tr");
                    row.innerHTML = `
                        <td>#${order.orderNumber || order._id.slice(-6).toUpperCase()}</td>
                        <td>${date}</td>
                        <td>${reason}</td>
                        <td>${statusBadge}</td>
                        <td>${refundAmt}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                console.error(err);
                document.getElementById("cancellationsTableBody").innerHTML = `<tr><td colspan="5" class="text-center py-4 text-danger">Error loading cancellations</td></tr>`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadUserInfo().then(() => {
                loadCancellations();
            });
        });
    </script>
