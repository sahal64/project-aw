<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroWatch - Coupons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --font-family: 'Outfit', sans-serif;
            --sidebar-width: 260px;
        }

        body {
            font-family: var(--font-family);
            background-color: #f8f9fa;
        }

        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: #fff;
            border-right: 1px solid #eee;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 40px;
            display: block;
            color: #000;
            text-decoration: none;
        }

        .nav-label {
            font-size: 0.8rem;
            color: #999;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 10px;
            margin-top: 20px;
            display: block;
        }

        .nav-link {
            color: #6c757d;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }

        .nav-link i {
            margin-right: 10px;
            font-size: 1.1rem;
        }

        .nav-link:hover,
        .nav-link.active {
            background-color: #000;
            color: #fff;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 30px;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <a href="dashboard.html" class="sidebar-brand"><img src="../common/images/logo.png" alt="AeroWatch"
                style="max-height: 50px;"></a>

        <span class="nav-label">Main menu</span>
        <nav class="nav flex-column">
            <a href="/admin/dashboard.html" class="nav-link"><i class="bi bi-grid-fill"></i> Dashboard</a>
            <a href="/admin/order-management.html" class="nav-link"><i class="bi bi-cart"></i> Order Management</a>
            <a href="/admin/customers.html" class="nav-link"><i class="bi bi-people"></i> Customers</a>
            <a href="/admin/coupon.html" class="nav-link active"><i class="bi bi-ticket-perforated"></i> Coupon Code</a>
            <a href="/admin/categories.html" class="nav-link"><i class="bi bi-tags"></i> Categories</a>
            <a href="/admin/transaction.html" class="nav-link"><i class="bi bi-wallet2"></i> Transaction</a>
            <a href="/admin/brand.html" class="nav-link"><i class="bi bi-award"></i> Brand</a>
            <a href="/admin/sales-offers.html" class="nav-link"><i class="bi bi-percent"></i> Sales & Offers</a>
        </nav>

        <span class="nav-label">Product</span>
        <nav class="nav flex-column">
            <a href="/admin/add-product.html" class="nav-link"><i class="bi bi-plus-circle"></i> Add Products</a>
            <a href="/admin/all-products.html" class="nav-link"><i class="bi bi-list-ul"></i> Product List</a>
        </nav>

            <a href="#" class="nav-link mt-3 text-danger" id="admin-logout"><i class="bi bi-box-arrow-right"></i>
                Logout</a>
        </nav>

        <div class="mt-auto pt-4">
            <div class="d-flex align-items-center p-3 rounded bg-light">
                <div class="bg-dark text-white rounded-circle d-flex align-items-center justify-content-center"
                    style="width: 35px; height: 35px;" id="adminAvatar">A</div>
                <div class="ms-3">
                    <h6 class="mb-0 fs-6" id="adminName">Loading...</h6>
                    <small class="text-muted" style="font-size: 0.7rem;">Admin</small>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold m-0">Coupon Codes</h4>
            <button class="btn btn-dark" data-bs-toggle="modal" data-bs-target="#addCouponModal"><i
                    class="bi bi-plus-lg"></i> Add Coupon</button>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <table class="table align-middle table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>Code</th>
                            <th>Discount</th>
                            <th>Min Spend</th>
                            <th>Usage</th>
                            <th>Expiry</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="couponTableBody">
                        <tr>
                            <td colspan="5" class="text-center py-4 text-muted">Loading coupons...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add Coupon Modal -->
    <div class="modal fade" id="addCouponModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="addCouponForm">
                    <div class="modal-header border-bottom-0 pb-0">
                        <h5 class="modal-title fw-bold">Add New Coupon</h5>
                        <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body pt-4">
                        <div class="mb-3">
                            <label class="form-label text-muted small mb-1">Coupon Code (Uppercase)</label>
                            <input type="text"
                                class="form-control"
                                id="couponCode"
                                maxlength="20"c
                                placeholder="e.g. SUMMER10"
                                style="text-transform: uppercase;"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small mb-1">Description</label>
                            <textarea class="form-control" id="description" rows="2"
                                placeholder="e.g. Summer Sale Discount"></textarea>
                        </div>
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label text-muted small mb-1">Discount Type</label>
                                <select class="form-select" id="discountType" required>
                                    <option value="percentage">Percentage (%)</option>
                                    <option value="fixed">Fixed Amount (₹)</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label text-muted small mb-1">Discount Value</label>
                                <input type="number" class="form-control" id="discountValue" min="1" step="1"
                                    required>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label text-muted small mb-1">Min Spend (₹)</label>
                                <input type="number" class="form-control" id="minimumSpend" min="0" step="0.01"
                                    value="0">
                            </div>
                            <div class="col-6">
                                <label class="form-label text-muted small mb-1">Max Discount (₹)</label>
                                <input type="number" class="form-control" id="maximumDiscount" min="0" step="0.01"
                                    placeholder="Optional">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label text-muted small mb-1">Start Date</label>
                                <input type="date" class="form-control" id="startDate">
                            </div>
                            <div class="col-6">
                                <label class="form-label text-muted small mb-1">Expiry Date</label>
                                <input type="date" class="form-control" id="expiryDate" required>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label text-muted small mb-1">Max Uses (Total)</label>
                                <input type="number" class="form-control" id="maxUses" min="1" step="1" placeholder="Optional">
                            </div>
                            <div class="col-6">
                                <label class="form-label text-muted small mb-1">Per User Limit</label>
                                <input type="number" class="form-control" id="perUserLimit" min="1" step="1" value="1">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer border-top-0 pt-0">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-dark px-4">Save Coupon</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/admin/js/admin-sidebar.js"></script>
    <script>



        // ==========================
        // COUPON MANAGEMENT
        // ==========================
        async function loadCoupons() {
            try {
                const res = await Auth.fetch("/api/admin/coupons");
                const tbody = document.getElementById("couponTableBody");

                if (!res.ok) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-danger">Failed to load coupons</td></tr>';
                    return;
                }

                const coupons = await res.json();

                if (coupons.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">No coupons found</td></tr>';
                    return;
                }

                let html = '';
                coupons.forEach(coupon => {
                    const expiryDate = new Date(coupon.expiryDate);
                    const isExpired = expiryDate < new Date();

                    let statusBadge = '';
                    if (!coupon.isActive) {
                        statusBadge = '<span class="badge bg-secondary">Inactive</span>';
                    } else if (isExpired) {
                        statusBadge = '<span class="badge bg-danger">Expired</span>';
                    } else {
                        statusBadge = '<span class="badge bg-success">Active</span>';
                    }

                    const discountText = coupon.discountType === 'percentage' ? `${coupon.discountValue}% OFF` : `₹${coupon.discountValue} OFF`;
                    const expiryText = expiryDate.toLocaleDateString("en-IN");

                    const toggleIcon = coupon.isActive ? 'bi-toggle-on text-success' : 'bi-toggle-off text-muted';
                    const usageText = coupon.maxUses ? `${coupon.usedCount} / ${coupon.maxUses}` : `${coupon.usedCount} / ∞`;
                    const minSpendText = `₹${coupon.minimumSpend || 0}`;

                    html += `
                        <tr>
                            <td>
                                <div class="fw-bold text-primary">${coupon.code}</div>
                                <small class="text-muted d-block" style="font-size: 0.7rem;">${coupon.description || 'No description'}</small>
                            </td>
                            <td>${discountText}</td>
                            <td>${minSpendText}</td>
                            <td>${usageText}</td>
                            <td>${expiryText}</td>
                            <td>${statusBadge}</td>
                            <td>
                                <button class="btn btn-sm btn-light" onclick="toggleCoupon('${coupon._id}')" title="Toggle Status"><i class="bi ${toggleIcon} fs-5"></i></button>
                                <button class="btn btn-sm btn-light text-dark ms-1" onclick='openEditModal(${JSON.stringify(coupon)})' title="Edit"><i class="bi bi-pencil fs-6"></i></button>
                                <button class="btn btn-sm btn-light text-danger ms-1" onclick="deleteCoupon('${coupon._id}')" title="Delete"><i class="bi bi-trash fs-6"></i></button>
                            </td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;
            } catch (err) {
                console.error(err);
                document.getElementById("couponTableBody").innerHTML = '<tr><td colspan="7" class="text-center py-4 text-danger">Error loading coupons</td></tr>';
            }
        }

        let currentEditId = null;

        function openEditModal(coupon) {
            currentEditId = coupon._id;

            // Set Modal Title
            document.querySelector('#addCouponModal .modal-title').innerText = 'Edit Coupon';
            document.querySelector('#addCouponForm button[type="submit"]').innerText = 'Update Coupon';

            // Pre-fill fields
            document.getElementById('couponCode').value = coupon.code;
            document.getElementById('description').value = coupon.description || '';
            document.getElementById('discountType').value = coupon.discountType;
            document.getElementById('discountValue').value = coupon.discountValue;
            document.getElementById('minimumSpend').value = coupon.minimumSpend || 0;
            document.getElementById('maximumDiscount').value = coupon.maximumDiscount || '';

            if (coupon.startDate) {
                document.getElementById('startDate').value = new Date(coupon.startDate).toISOString().split('T')[0];
            } else {
                document.getElementById('startDate').value = '';
            }

            document.getElementById('expiryDate').value = new Date(coupon.expiryDate).toISOString().split('T')[0];
            document.getElementById('maxUses').value = coupon.maxUses || '';
            document.getElementById('perUserLimit').value = coupon.perUserLimit || 1;

            // Show Modal
            const modalEl = document.getElementById('addCouponModal');
            const modalObj = new bootstrap.Modal(modalEl);
            modalObj.show();
        }

        // Reset modal state when closed
        document.getElementById('addCouponModal').addEventListener('hidden.bs.modal', function () {
            currentEditId = null;
            document.querySelector('#addCouponModal .modal-title').innerText = 'Add New Coupon';
            document.querySelector('#addCouponForm button[type="submit"]').innerText = 'Save Coupon';
            document.getElementById('addCouponForm').reset();
        });

        async function deleteCoupon(id) {
            Swal.fire({
                title: 'Delete this coupon?',
                text: "This action cannot be undone.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Yes, delete it'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        const res = await Auth.fetch(`/api/admin/coupons/${id}`, {
                            method: 'DELETE'
                        });
                        if (res.ok) {
                            Swal.fire({
                                icon: 'success',
                                title: 'Deleted!',
                                text: 'Coupon has been deleted.',
                                confirmButtonColor: '#000'
                            });
                            loadCoupons();
                        } else {
                            const data = await res.json();
                            Swal.fire({
                                icon: 'error',
                                title: 'Error',
                                text: data.message || 'Error deleting coupon',
                                confirmButtonColor: '#d33'
                            });
                        }
                    } catch (err) {
                        console.error(err);
                        Swal.fire({
                            icon: 'error',
                            title: 'Error',
                            text: 'An error occurred',
                            confirmButtonColor: '#d33'
                        });
                    }
                }
            });
        }

        async function toggleCoupon(id) {
            try {
                const res = await Auth.fetch(`/api/admin/coupons/${id}/toggle`, {
                    method: 'PATCH'
                });
                if (res.ok) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Updated',
                        text: 'Coupon status updated successfully',
                        confirmButtonColor: '#000'
                    });
                    loadCoupons();
                } else {
                    const data = await res.json();
                    Swal.fire({
                        icon: 'error',
                        title: 'Error',
                        text: data.message || 'Error toggling coupon status',
                        confirmButtonColor: '#d33'
                    });
                }
            } catch (err) {
                console.error(err);
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'An error occurred',
                    confirmButtonColor: '#d33'
                });
            }
        }

        document.getElementById('addCouponForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            // ========================
            // COUPON FORM VALIDATION
            // ========================

            const code = document.getElementById("couponCode").value.trim();
            const description = document.getElementById("description").value.trim();
            const discountType = document.getElementById("discountType").value;
            const discountValue = Number(document.getElementById("discountValue").value);
            const minSpend = Number(document.getElementById("minimumSpend").value) || 0;
            const maxDiscount = document.getElementById("maximumDiscount").value
                ? Number(document.getElementById("maximumDiscount").value)
                : null;

            const startDate = document.getElementById("startDate").value;
            const expiryDate = document.getElementById("expiryDate").value;
            const maxUses = document.getElementById("maxUses").value;
            const perUserLimit = Number(document.getElementById("perUserLimit").value) || 1;

            // Coupon code validation
            if (!/^[A-Z0-9]{4,20}$/.test(code)) {
                Swal.fire({
                    icon: "error",
                    title: "Invalid Coupon Code",
                    text: "Coupon code must be 4–20 characters using only uppercase letters and numbers."
                });
                return;
            }

            // Discount validation
            if (!discountValue || discountValue <= 0) {
                Swal.fire({
                    icon: "error",
                    title: "Invalid Discount",
                    text: "Discount value must be greater than 0."
                });
                return;
            }

            // Percentage rule
            if (discountType === "percentage" && discountValue > 90) {
                Swal.fire({
                    icon: "error",
                    title: "Invalid Percentage",
                    text: "Percentage discount cannot exceed 90%."
                });
                return;
            }

            // Minimum spend
            if (minSpend < 0) {
                Swal.fire({
                    icon: "error",
                    title: "Invalid Minimum Spend",
                    text: "Minimum spend cannot be negative."
                });
                return;
            }

            // Maximum discount
            if (maxDiscount !== null && maxDiscount < 0) {
                Swal.fire({
                    icon: "error",
                    title: "Invalid Max Discount",
                    text: "Maximum discount cannot be negative."
                });
                return;
            }

            // Date validation
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const start = startDate ? new Date(startDate) : null;
            const expiry = new Date(expiryDate);

            if (expiry < today) {
                Swal.fire({
                    icon: "error",
                    title: "Invalid Expiry Date",
                    text: "Expiry date cannot be in the past."
                });
                return;
            }

            if (start && expiry < start) {
                Swal.fire({
                    icon: "error",
                    title: "Invalid Date Range",
                    text: "Expiry date must be after start date."
                });
                return;
            }

            // Usage limits
            if (maxUses && Number(maxUses) <= 0) {
                Swal.fire({
                    icon: "error",
                    title: "Invalid Max Uses",
                    text: "Max uses must be greater than 0."
                });
                return;
            }

            if (perUserLimit <= 0) {
                Swal.fire({
                    icon: "error",
                    title: "Invalid Per User Limit",
                    text: "Per user limit must be at least 1."
                });
                return;
            }

            const btn = this.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerText = 'Saving...';

            const payload = {
                code,
                description,
                discountType,
                discountValue,
                minimumSpend: minSpend,
                maximumDiscount: maxDiscount,
                startDate: startDate || null,
                expiryDate,
                maxUses: maxUses ? Number(maxUses) : null,
                perUserLimit
            };

            try {
                const url = currentEditId ? `/api/admin/coupons/${currentEditId}` : '/api/admin/coupons';
                const method = currentEditId ? 'PUT' : 'POST';

                const res = await Auth.fetch(url, {
                    method: method,
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (res.ok) {
                    const modalEl = document.getElementById('addCouponModal');
                    const modalObj = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
                    modalObj.hide();
                    this.reset();

                    Swal.fire({
                        icon: 'success',
                        title: 'Success',
                        text: currentEditId ? 'Coupon updated successfully' : 'Coupon created successfully',
                        confirmButtonColor: '#000'
                    });

                    loadCoupons();
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Error',
                        text: data.message || 'Error saving coupon',
                        confirmButtonColor: '#d33'
                    });
                }
            } catch (err) {
                console.error(err);
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'A server error occurred',
                    confirmButtonColor: '#d33'
                });
            } finally {
                btn.disabled = false;
                btn.innerText = 'Save Coupon';
            }
        });

        async function checkAdminAuth() {
            return await Auth.checkBackendAccess("admin");
        }

        document.addEventListener("DOMContentLoaded", () => {
            checkAdminAuth().then((isAuth) => {
                if (isAuth) loadCoupons();
            });
        });

        document.getElementById("admin-logout").addEventListener("click", async (e) => {
            e.preventDefault();
            Auth.logout();
        });

        // Restrict coupon code characters
        document.getElementById("couponCode").addEventListener("input", function () {
            this.value = this.value
                .toUpperCase()
                .replace(/[^A-Z0-9]/g, '');
        });
    </script>
</body>

</html>
