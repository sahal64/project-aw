<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroWatch - Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --font-family: 'Outfit', sans-serif;
            --sidebar-width: 260px;
        }

        body {
            font-family: var(--font-family);
            background-color: #f8f9fa;
        }

        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: #fff;
            border-right: 1px solid #eee;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 40px;
            display: block;
            color: #000;
            text-decoration: none;
        }

        .nav-label {
            font-size: 0.8rem;
            color: #999;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 10px;
            margin-top: 20px;
            display: block;
        }

        .nav-link {
            color: #6c757d;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }

        .nav-link i {
            margin-right: 10px;
            font-size: 1.1rem;
        }

        .nav-link:hover,
        .nav-link.active {
            background-color: #000;
            color: #fff;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 30px;
        }

        .form-section {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #eee;
            margin-bottom: 20px;
        }

        /* STRUCTURED IMAGE EDITING STYLES */
        .image-card {
            border: 1px dashed #ddd;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            background: #fff;
            transition: 0.3s;
            height: 100%;
        }

        .image-card:hover {
            border-color: #000;
        }

        .image-preview {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #f8f9fa;
        }

        .slot-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
            display: block;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <a href="dashboard.html" class="sidebar-brand"><img src="../common/images/logo.png" alt="AeroWatch"
                style="max-height: 50px;"></a>

        <span class="nav-label">Main menu</span>
        <nav class="nav flex-column">
            <a href="/admin/dashboard.html" class="nav-link"><i class="bi bi-grid-fill"></i> Dashboard</a>
            <a href="/admin/order-management.html" class="nav-link"><i class="bi bi-cart"></i> Order Management</a>
            <a href="/admin/customers.html" class="nav-link"><i class="bi bi-people"></i> Customers</a>
            <a href="/admin/coupon.html" class="nav-link"><i class="bi bi-ticket-perforated"></i> Coupon Code</a>
            <a href="/admin/categories.html" class="nav-link"><i class="bi bi-tags"></i> Categories</a>
            <a href="/admin/transaction.html" class="nav-link"><i class="bi bi-wallet2"></i> Transaction</a>
            <a href="/admin/brand.html" class="nav-link"><i class="bi bi-award"></i> Brand</a>
            <a href="/admin/sales-offers.html" class="nav-link"><i class="bi bi-percent"></i> Sales & Offers</a>
        </nav>

        <span class="nav-label">Product</span>
        <nav class="nav flex-column">
            <a href="/admin/add-product.html" class="nav-link active"><i class="bi bi-plus-circle"></i> Add Products</a>
            <a href="/admin/all-products.html" class="nav-link"><i class="bi bi-list-ul"></i> Product List</a>
        </nav>

            <a href="#" class="nav-link mt-3 text-danger" id="admin-logout"><i class="bi bi-box-arrow-right"></i>
                Logout</a>
        </nav>

        <div class="mt-auto pt-4">
            <div class="d-flex align-items-center p-3 rounded bg-light">
                <div class="bg-dark text-white rounded-circle d-flex align-items-center justify-content-center"
                    style="width: 35px; height: 35px;" id="adminAvatar">A</div>
                <div class="ms-3">
                    <h6 class="mb-0 fs-6" id="adminName">Loading...</h6>
                    <small class="text-muted" style="font-size: 0.7rem;">Admin</small>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <h4 class="fw-bold mb-4">Add New Product</h4>

        <form id="addProductForm">

            <div class="row">
                <div class="col-lg-8">
                    <div class="form-section">
                        <h5 class="fw-bold mb-4">General Information</h5>
                        <div class="mb-3">
                            <label class="form-label">Product Name</label>
                            <input type="text" id="productName" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Brand</label>
                            <input type="text" class="form-control" id="brand" placeholder="Enter brand name">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea id="productDescription" class="form-control" rows="5"></textarea>
                        </div>
                    </div>

                    <div class="form-section">
                        <h5 class="fw-bold mb-4">Pricing & Stock</h5>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Base Price ($)</label>
                                <input type="number" id="productPrice" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Discount Price ($)</label>
                                <input type="number" class="form-control" placeholder="0.00">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Stock Quantity</label>
                                <input type="number" id="productStock" class="form-control" required>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="form-section">
                        <h5 class="fw-bold mb-4">Category</h5>
                        <label class="form-label">Product Category</label>
                        <select id="productCategory" class="form-select mb-3" required>
                            <option value="">Select Category</option>
                            <option value="men">Men</option>
                            <option value="women">Women</option>
                        </select>
                        <label class="form-label">Tags</label>
                        <input type="text" class="form-control" placeholder="e.g. watch, luxury">
                    </div>

                    <div class="form-section">
                        <h5 class="fw-bold mb-4">Product Images (Max 3)</h5>
                        <div class="row g-3">
                            <div class="col-12">
                                <div class="image-card">
                                    <span class="slot-label">Main Card Image</span>
                                    <img id="imagePreview0" class="image-preview" src="/uploads/placeholder.png"
                                        onerror="this.onerror=null;this.src='/uploads/placeholder.png'">
                                    <input type="file" id="imageInput0" accept="image/*" hidden
                                        onchange="previewImage(0)">
                                    <button type="button" class="btn btn-sm btn-outline-dark w-100"
                                        onclick="changeImage(0)">Change</button>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="image-card">
                                    <span class="slot-label">Details Image 1</span>
                                    <img id="imagePreview1" class="image-preview" src="/uploads/placeholder.png"
                                        onerror="this.onerror=null;this.src='/uploads/placeholder.png'">
                                    <input type="file" id="imageInput1" accept="image/*" hidden
                                        onchange="previewImage(1)">
                                    <button type="button" class="btn btn-sm btn-outline-dark w-100"
                                        onclick="changeImage(1)">Change</button>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="image-card">
                                    <span class="slot-label">Details Image 2</span>
                                    <img id="imagePreview2" class="image-preview" src="/uploads/placeholder.png"
                                        onerror="this.onerror=null;this.src='/uploads/placeholder.png'">
                                    <input type="file" id="imageInput2" accept="image/*" hidden
                                        onchange="previewImage(2)">
                                    <button type="button" class="btn btn-sm btn-outline-dark w-100"
                                        onclick="changeImage(2)">Change</button>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <div class="d-flex justify-content-end mb-5">
                <button type="button" class="btn btn-light me-2"
                    onclick="window.location.href='all-products.html'">Cancel</button>
                <button type="submit" class="btn btn-dark px-4">Publish Product</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/admin/js/admin-sidebar.js"></script>
    <script>
        // ==========================
        // IMAGE SLOT MANAGEMENT
        // ==========================
        const originalImages = [null, null, null];

        function changeImage(index) {
            document.getElementById(`imageInput${index}`).click();
        }

        function previewImage(index) {
            const fileInput = document.getElementById(`imageInput${index}`);
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById(`imagePreview${index}`).src = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        }

        // ==========================
        // ADMIN AUTH CHECK
        // ==========================
        async function checkAdminAuth() {
            return await Auth.checkBackendAccess("admin");
        }

        document.addEventListener("DOMContentLoaded", checkAdminAuth);

        // ==========================
        // ADMIN LOGOUT
        // ==========================
        document.getElementById("admin-logout").addEventListener("click", async (e) => {
            e.preventDefault();
            Auth.logout();
        });

        // ==========================
        // CHECK IF EDIT MODE
        // ==========================
        const params = new URLSearchParams(window.location.search);
        const productId = params.get("id");

        if (productId) {
            loadProductForEdit(productId);
        }

        async function loadProductForEdit(id) {
            try {
                let res = await Auth.fetch(`/api/admin/products/${id}`);

                if (!res.ok) {
                    Swal.fire({ icon: "error", title: "Error", text: "Failed to load product" });
                    return;
                }

                const data = await res.json();
                const product = data.product;

                // Fill form fields
                document.getElementById("productName").value = product.name;
                document.getElementById("productDescription").value = product.description;
                document.getElementById("productPrice").value = product.price;
                document.getElementById("productStock").value = product.stock;
                document.getElementById("productCategory").value = product.category;
                document.getElementById("brand").value = product.brand;

                // Populate Image Slots
                for (let i = 0; i < 3; i++) {
                    const img = product.images && product.images[i];
                    const preview = document.getElementById(`imagePreview${i}`);
                    if (img) {
                        preview.src = img;
                        originalImages[i] = img;
                    } else {
                        preview.src = "/uploads/placeholder.png";
                        originalImages[i] = null;
                    }
                }

                // Change page title
                document.querySelector("h4").innerText = "Edit Product";
                document.querySelector("button[type='submit']").innerText = "Update Product";

            } catch (err) {
                console.error(err);
            }
        }

        // ==========================
        // FORM SUBMISSION (ADD/EDIT)
        // ==========================
        document.getElementById("addProductForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const submitBtn = document.querySelector("button[type='submit']");
            const originalBtnText = submitBtn.innerText;

            const name = document.getElementById("productName").value.trim();
            const brand = document.getElementById("brand").value.trim();
            const description = document.getElementById("productDescription").value.trim();
            const price = document.getElementById("productPrice").value;
            const stock = document.getElementById("productStock").value;
            const category = document.getElementById("productCategory").value;

            // Collect Files from Slots
            const fileInputs = [
                document.getElementById("imageInput0"),
                document.getElementById("imageInput1"),
                document.getElementById("imageInput2")
            ];

            // VALIDATION
            if (!/^[A-Za-z0-9\s-']{3,100}$/.test(name)) {
                Swal.fire({ 
                    icon: "error", 
                    title: "Invalid Product Name", 
                    text: "Product name must be 3–100 characters and can include letters, numbers, spaces, hyphens, and apostrophes." 
                });
                return;
            }

            if (!/^[A-Za-z\s]{2,50}$/.test(brand)) {
                Swal.fire({ icon: "error", title: "Invalid Brand", text: "Brand must be 2-50 characters (letters/spaces only)." });
                return;
            }

            if (!category) {
                Swal.fire({ icon: "error", title: "Category Required", text: "Please select a category." });
                return;
            }

            if (description.length < 10 || description.length > 2000) {
                Swal.fire({ icon: "error", title: "Invalid Description", text: "Description must be 10-2000 characters." });
                return;
            }

            if (!price || price <= 0) {
                Swal.fire({ icon: "error", title: "Invalid Price", text: "Price must be greater than 0." });
                return;
            }

            if (stock === "" || stock < 0) {
                Swal.fire({ icon: "error", title: "Invalid Stock", text: "Stock cannot be negative." });
                return;
            }

            // Image Validation
            if (!productId && fileInputs[0].files.length === 0) {
                Swal.fire({ icon: "warning", title: "Main Image Required", text: "Please upload at least the Main Card Image." });
                return;
            }

            const allowedTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/webp'];
            for (let i = 0; i < 3; i++) {
                const file = fileInputs[i].files[0];
                if (file) {
                    if (!allowedTypes.includes(file.type)) {
                        Swal.fire({ icon: "error", title: "Invalid File Type", text: `Slot ${i + 1} format not supported.` });
                        return;
                    }
                    if (file.size > 5 * 1024 * 1024) {
                        Swal.fire({ icon: "error", title: "File Too Large", text: `Slot ${i + 1} exceeds 5MB.` });
                        return;
                    }
                }
            }

            submitBtn.disabled = true;
            submitBtn.innerText = productId ? "Updating..." : "Publishing...";

            const formData = new FormData();
            formData.append("name", name);
            formData.append("description", description);
            formData.append("price", price);
            formData.append("stock", stock);
            formData.append("category", category);
            formData.append("brand", brand);

            // Handle Images (Backend compatibility workaround)
            try {
                let hasNewImages = false;
                for (let i = 0; i < 3; i++) {
                    if (fileInputs[i].files[0]) hasNewImages = true;
                }

                if (!productId || hasNewImages) {
                    for (let i = 0; i < 3; i++) {
                        const file = fileInputs[i].files[0];
                        if (file) {
                            formData.append("images", file);
                        } else if (productId && originalImages[i]) {
                            // Re-fetch existing image and re-upload as blob to preserve order and existence
                            const response = await fetch(originalImages[i]);
                            const blob = await response.blob();
                            const fileName = originalImages[i].split('/').pop();
                            formData.append("images", blob, fileName);
                        }
                    }
                }
            } catch (err) {
                console.error("Image processing error:", err);
                Swal.fire({ icon: "error", title: "Image Error", text: "Failed to process images." });
                submitBtn.disabled = false;
                submitBtn.innerText = originalBtnText;
                return;
            }

            try {
                let url = "/api/admin/products";
                let method = "POST";
                if (productId) {
                    url = `/api/admin/products/${productId}`;
                    method = "PUT";
                }

                let res = await Auth.fetch(url, {
                    method: method,
                    body: formData
                });

                const data = await res.json();
                if (!res.ok) {
                    Swal.fire({ icon: "error", title: "Error", text: data.message || "Operation failed" });
                    submitBtn.disabled = false;
                    submitBtn.innerText = originalBtnText;
                    return;
                }

                Swal.fire({ icon: "success", title: "Success", text: productId ? "Product updated!" : "Product added!" })
                    .then(() => window.location.href = "all-products.html");

            } catch (err) {
                console.error("Submission error:", err);
                Swal.fire({ icon: "error", title: "Error", text: "Something went wrong." });
                submitBtn.disabled = false;
                submitBtn.innerText = originalBtnText;
            }
        });
    </script>
</body>

</html>
