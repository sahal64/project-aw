<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AeroWatch - Checkout</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

  <style>
    :root {
      --font-family: 'Outfit', sans-serif;
      --primary-color: #000000;
      --secondary-color: #f8f9fa;
      --text-color: #333333;
      --muted-color: #6c757d;
    }

    body {
      font-family: var(--font-family);
      color: var(--text-color);
      background-color: #ffffff;
    }

    .navbar {
      padding-top: 20px;
      padding-bottom: 20px;
      background-color: #fff;
      border-bottom: 1px solid #eee;
    }

    .navbar-brand {
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--primary-color);
    }

    .form-control,
    .form-select {
      padding: 12px;
      background-color: #f8f9fa;
      border: 1px solid #eee;
    }

    .form-control:focus,
    .form-select:focus {
      box-shadow: none;
      border-color: #000;
      background: #fff;
    }

    .order-summary {
      background: #fafafa;
      border: 1px solid #eee;
      padding: 40px;
    }

    .btn-dark-custom {
      background-color: var(--primary-color);
      color: #fff;
      padding: 15px 30px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 1px solid #000;
      width: 100%;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }

    .btn-dark-custom:hover {
      background-color: #fff;
      color: #000;
    }

    .btn-outline-dark-custom {
      background-color: transparent;
      color: #000;
      padding: 10px 20px;
      font-weight: 500;
      border: 1px solid #000;
      transition: all 0.3s ease;
      font-size: 0.85rem;
    }

    .btn-outline-dark-custom:hover {
      background-color: #000;
      color: #fff;
    }

    /* Address Cards */
    .address-card {
      border: 1px solid #eee;
      padding: 20px;
      margin-bottom: 15px;
      cursor: pointer;
      transition: 0.2s;
      background: #fff;
      position: relative;
    }

    .address-card:hover {
      border-color: #ccc;
    }

    .address-card.active {
      border-color: #000;
      background: #fafafa;
    }

    .address-card.active::after {
      content: '✓';
      position: absolute;
      top: 20px;
      right: 20px;
      font-weight: bold;
    }

    /* Payment Cards */
    .payment-option {
      border: 1px solid #eee;
      padding: 15px 20px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      cursor: pointer;
      transition: 0.2s;
      background: #fff;
    }

    .payment-option:hover {
      border-color: #ccc;
    }

    .payment-option.active {
      border-color: #000;
      background: #fafafa;
    }

    .payment-option input[type="radio"] {
      margin-right: 15px;
      accent-color: #000;
    }

    footer {
      margin-top: 80px;
      padding: 30px 0;
      border-top: 1px solid #eee;
    }
  </style>
</head>

<body>

  <!-- Minimal Header for Checkout -->
  <nav class="navbar navbar-light bg-light">
    <div class="container px-5">
      <a class="navbar-brand" href="home.html"><img src="../common/images/logo.png" alt="AeroWatch"
          style="height: 55px;"></a>
      <span class="text-muted">Secure Checkout</span>
    </div>
  </nav>

  <!-- Checkout Config -->
  <div class="container px-lg-5 mt-5 mb-5 pb-5">
    <div class="row g-5">

      <!-- LEFT SIDE: Shipping Address -->
      <div class="col-lg-7">
        <h4 class="mb-4 fw-bold text-uppercase" style="letter-spacing: 1px;">Shipping Address</h4>

        <p class="text-muted mb-3">Select Delivery Address</p>

        <!-- Dynamic Address List -->
        <div id="addressListContainer">
          <!-- Rendered via JS -->
        </div>

        <!-- Empty Address State -->
        <div id="emptyAddressState" class="text-center p-5 mb-4 border" style="background: #fafafa;">
          <i class="bi bi-geo-alt text-danger fs-2 mb-2 d-block"></i>
          <h6 class="text-danger fw-bold">Delivery Address Missing</h6>
          <p class="text-muted small mb-0">Please add an address to place your order.</p>
        </div>

        <button class="btn btn-outline-dark-custom" data-bs-toggle="modal" data-bs-target="#addressModal">
          <i class="bi bi-plus text-lg"></i> Add New Address
        </button>

      </div>

      <!-- RIGHT SIDE: Order Summary & Payment -->
      <div class="col-lg-5">
        <div class="order-summary">
          <h5 class="mb-4 fw-bold text-uppercase" style="letter-spacing: 1px;">Order Summary</h5>

          <!-- Mini Product List -->
          <ul class="list-unstyled mb-4" id="orderSummaryList">
            <!-- Rendered by JS -->
          </ul>

          <!-- Cart Totals -->
          <div class="border-top pt-3 mb-4">
            <div class="d-flex justify-content-between mb-2">
              <span class="text-muted">Subtotal</span>
              <span id="subtotalDisplay" class="fw-medium">₹0</span>
            </div>
            <div class="d-flex justify-content-between mb-3">
              <span class="text-muted">Shipping</span>
              <span class="fw-medium text-success">Free</span>
            </div>
            <div class="d-flex justify-content-between fw-bold fs-5">
              <span>Total</span>
              <span id="totalDisplay" class="text-primary" style="color: #000 !important;">₹0</span>
            </div>
          </div>

          <h6 class="fw-bold text-uppercase mb-3 mt-5" style="letter-spacing: 1px; font-size: 0.85rem;">Payment Method
          </h6>

          <div class="payment-methods mb-4">
            <!-- Wallet -->
            <label class="payment-option border">
              <input type="radio" name="paymentMethod" value="Razorpay" id="wallet">
              <div class="w-100 d-flex justify-content-between align-items-center">
                <div>
                  <span class="d-block fw-medium">My Wallet</span>
                  <small class="text-muted">Balance: ₹0.00 <span class="text-danger">(Insufficient)</span></small>
                </div>
                <i class="bi bi-wallet2 text-muted"></i>
              </div>
            </label>

            <!-- Razorpay / Card -->
            <label class="payment-option border active">
              <input type="radio" name="paymentMethod" value="Stripe" id="credit" checked>
              <div class="w-100 d-flex justify-content-between align-items-center">
                <span class="fw-medium">Razorpay / UPI / Card</span>
                <i class="bi bi-credit-card text-muted"></i>
              </div>
            </label>

            <!-- COD -->
            <label class="payment-option border">
              <input type="radio" name="paymentMethod" value="COD" id="cod">
              <div class="w-100 d-flex justify-content-between align-items-center">
                <span class="fw-medium">Cash on Delivery</span>
                <i class="bi bi-cash-stack text-muted"></i>
              </div>
            </label>
          </div>

          <button class="btn btn-dark-custom btn-lg w-100" id="placeOrderBtn">
            Place Order
          </button>
          <div class="text-center mt-3 text-muted small">
            <i class="bi bi-shield-check text-success"></i> Secure encrypted transaction
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add New Address Modal -->
  <div class="modal fade" id="addressModal" tabindex="-1" aria-labelledby="addressModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-0">
        <div class="modal-header border-bottom-0 pb-0">
          <h5 class="modal-title fw-bold" id="addressModalLabel">Add New Address</h5>
          <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="newAddressForm">
            <div class="row g-3">
              <div class="col-6">
                <label class="small text-muted mb-1">First Name*</label>
                <input type="text" class="form-control rounded-0 shadow-none border-dark" id="modalFirstName" required>
              </div>
              <div class="col-6">
                <label class="small text-muted mb-1">Last Name*</label>
                <input type="text" class="form-control rounded-0 shadow-none border-dark" id="modalLastName" required>
              </div>
              <div class="col-6">
                <label class="small text-muted mb-1">Phone*</label>
                <input type="text" class="form-control rounded-0 shadow-none border-dark" id="modalPhone"
                  placeholder="10 digit number" required>
              </div>
              <div class="col-6">
                <label class="small text-muted mb-1">Pincode*</label>
                <input type="text" class="form-control rounded-0 shadow-none border-dark" id="modalZip" required>
              </div>
              <div class="col-12">
                <label class="small text-muted mb-1">Street Address*</label>
                <input type="text" class="form-control rounded-0 shadow-none border-dark" id="modalAddress"
                  placeholder="House No, Street, Area" required>
              </div>
              <div class="col-6">
                <label class="small text-muted mb-1">City*</label>
                <input type="text" class="form-control rounded-0 shadow-none border-dark" id="modalCity" required>
              </div>
              <div class="col-6">
                <label class="small text-muted mb-1">State*</label>
                <select class="form-select rounded-0 shadow-none border-dark" id="modalState" required>
                  <option value="">Select State</option>
                  <option value="Delhi">Delhi</option>
                  <option value="Maharashtra">Maharashtra</option>
                  <option value="California">California</option>
                  <option value="New York">New York</option>
                </select>
              </div>
              <div class="col-12 mt-3">
                <div class="form-check">
                  <input class="form-check-input rounded-0 border-dark" type="checkbox" id="saveAddressCheck" checked>
                  <label class="form-check-label small" for="saveAddressCheck">
                    Save this address to my Address Book for future use
                  </label>
                </div>
              </div>
            </div>
            <div class="d-flex justify-content-end mt-4 pt-3 border-top">
              <button type="button" class="btn btn-light rounded-0 border me-2" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-dark rounded-0 px-4">Save & Use</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="container text-center">
      <small class="text-muted">AeroWatch © 2026</small>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // 🔐 Protect checkout page
    async function checkAuth() {
      let res = await fetch("/api/auth/me", {
        credentials: "include"
      });

      if (res.status === 401) {
        const refreshRes = await fetch("/api/auth/refresh", {
          method: "POST",
          credentials: "include"
        });

        if (!refreshRes.ok) {
          window.location.href = "login.html";
          return;
        }

        // retry original request
        res = await fetch("/api/auth/me", {
          credentials: "include"
        });
      }

      if (!res.ok) {
        window.location.href = "login.html";
      }
    }

    checkAuth();
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {

      /* =======================
         1. ORDER SUMMARY LOGIC
         ======================= */
      const cart = JSON.parse(localStorage.getItem("cartItems")) || [];
      const orderList = document.getElementById("orderSummaryList");
      const subtotalDisplay = document.getElementById("subtotalDisplay");
      const totalDisplay = document.getElementById("totalDisplay");

      let total = 0;
      orderList.innerHTML = "";

      if (cart.length === 0) {
        orderList.innerHTML = "<li class='text-muted small'>Your cart is empty</li>";
      } else {
        cart.forEach(item => {
          const itemTotal = item.price * item.quantity;
          total += itemTotal;

          const li = document.createElement("li");
          li.className = "d-flex justify-content-between mb-3 pb-3 border-bottom";
          li.innerHTML = `
            <div class="d-flex align-items-center">
                <img src="${item.image}" alt="${item.title}" style="width: 50px; height: 50px; object-fit: contain; margin-right: 15px; border: 1px solid #eee;">
                <div>
                    <h6 class="my-0 small fw-bold">${item.title}</h6>
                    <small class="text-muted">Qty: ${item.quantity}</small>
                </div>
            </div>
            <span class="fw-medium small">₹${itemTotal.toLocaleString('en-IN')}</span>
          `;
          orderList.appendChild(li);
        });
      }

      subtotalDisplay.innerText = `₹${total.toLocaleString('en-IN')}`;
      totalDisplay.innerText = `₹${total.toLocaleString('en-IN')}`;


      /* =======================
         2. PAYMENT SELECTION LOGIC
         ======================= */
      const paymentOptions = document.querySelectorAll(".payment-option");
      paymentOptions.forEach(option => {
        option.addEventListener("click", function () {
          paymentOptions.forEach(opt => opt.classList.remove("active"));
          this.classList.add("active");
          this.querySelector("input[type='radio']").checked = true;
        });
      });


      /* =======================
         3. ADDRESS MANAGEMENT LOGIC
         ======================= */
      const addressListContainer = document.getElementById("addressListContainer");
      const emptyAddressState = document.getElementById("emptyAddressState");
      const newAddressForm = document.getElementById("newAddressForm");

      let addresses = JSON.parse(localStorage.getItem("userAddresses")) || [];

      function renderAddresses() {
        addressListContainer.innerHTML = "";
        if (addresses.length === 0) {
          addressListContainer.classList.add("d-none");
          emptyAddressState.classList.remove("d-none");
        } else {
          emptyAddressState.classList.add("d-none");
          addressListContainer.classList.remove("d-none");

          addresses.forEach((addr, index) => {
            const card = document.createElement("div");
            // Make first address active by default
            card.className = `address-card ${index === 0 ? 'active' : ''}`;
            card.dataset.index = index;
            card.innerHTML = `
                      <div class="d-flex justify-content-between">
                          <h6 class="fw-bold mb-1">${addr.firstName} ${addr.lastName}</h6>
                          <span class="badge bg-light text-dark border">${addr.phone}</span>
                      </div>
                      <p class="text-muted small mb-0 mt-2" style="line-height: 1.5;">
                          ${addr.street}<br>
                          ${addr.city}, ${addr.state} ${addr.zip}
                      </p>
                  `;

            card.addEventListener("click", function () {
              document.querySelectorAll(".address-card").forEach(c => c.classList.remove("active"));
              this.classList.add("active");
            });

            addressListContainer.appendChild(card);
          });
        }
      }

      renderAddresses();

      newAddressForm.addEventListener("submit", function (e) {
        e.preventDefault();

        const newAddr = {
          firstName: document.getElementById("modalFirstName").value.trim(),
          lastName: document.getElementById("modalLastName").value.trim(),
          phone: document.getElementById("modalPhone").value.trim(),
          zip: document.getElementById("modalZip").value.trim(),
          street: document.getElementById("modalAddress").value.trim(),
          city: document.getElementById("modalCity").value.trim(),
          state: document.getElementById("modalState").value
        };

        // Save to local storage
        addresses.unshift(newAddr); // Add to beginning
        localStorage.setItem("userAddresses", JSON.stringify(addresses));

        // Close modal
        const modalEl = document.getElementById('addressModal');
        const modalObj = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
        modalObj.hide();

        // Re-render
        renderAddresses();
        newAddressForm.reset();
      });

      /* =======================
         4. PLACE ORDER LOGIC
         ======================= */
      document.getElementById("placeOrderBtn").addEventListener("click", async function () {

        if (cart.length === 0) {
          alert("Cart is empty. Please add products to proceed.");
          return;
        }

        // Get Active Address
        const activeCard = document.querySelector(".address-card.active");
        if (!activeCard) {
          alert("Please add and select a delivery address.");
          return;
        }

        const selectedAddressObj = addresses[activeCard.dataset.index];
        const fullAddress = `${selectedAddressObj.firstName} ${selectedAddressObj.lastName}, ${selectedAddressObj.street}, ${selectedAddressObj.city}, ${selectedAddressObj.state} ${selectedAddressObj.zip}, Phone: ${selectedAddressObj.phone}`;

        // Get Active Payment Method
        let selectedPaymentMethod = "COD";
        const pMethods = document.getElementsByName("paymentMethod");
        for (let p of pMethods) {
          if (p.checked) {
            selectedPaymentMethod = p.value; // "Stripe", "Razorpay", "COD"
            break;
          }
        }

        try {
          const response = await fetch("/api/orders", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            credentials: "include",
            body: JSON.stringify({
              items: cart.map(item => ({
               product: item.id,
               quantity: item.quantity
           })),
              address: selectedAddressObj,
              paymentMethod: selectedPaymentMethod
          })
          });

          const data = await response.json();

          if (!response.ok) {
            alert(data.message || "Order failed");
            return;
          }

          localStorage.removeItem("cartItems");

          // Optional: Show nice success modal before redirect
          alert("Order placed successfully! Redirecting to your orders...");
          window.location.href = "my-orders.html";

        } catch (error) {
          console.error(error);
          alert("Server error. Please try again later.");
        }

      });

    });
  </script>

</body>

</html>
