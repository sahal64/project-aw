<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AeroWatch - All Products</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root {
      --font-family: 'Outfit', sans-serif;
      --sidebar-width: 260px;
    }

    body {
      font-family: var(--font-family);
      background-color: #f8f9fa;
    }

    .sidebar {
      width: var(--sidebar-width);
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      background: #fff;
      border-right: 1px solid #eee;
      padding: 20px;
      overflow-y: auto;
    }

    .sidebar-brand {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 40px;
      display: block;
      color: #000;
      text-decoration: none;
    }

    .nav-label {
      font-size: 0.8rem;
      color: #999;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 10px;
      margin-top: 20px;
      display: block;
    }

    .nav-link {
      color: #6c757d;
      padding: 10px 15px;
      border-radius: 8px;
      margin-bottom: 5px;
      transition: 0.2s;
      display: flex;
      align-items: center;
    }

    .nav-link i {
      margin-right: 10px;
      font-size: 1.1rem;
    }

    .nav-link:hover,
    .nav-link.active {
      background-color: #000;
      color: #fff;
    }

    .main-content {
      margin-left: var(--sidebar-width);
      padding: 30px;
    }

    .table-img {
      width: 50px;
      height: 50px;
      object-fit: contain;
      background: #fff;
      border: 1px solid #eee;
      padding: 5px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <a href="dashboard.html" class="sidebar-brand"><img src="../common/images/logo.png" alt="AeroWatch"
        style="max-height: 50px;"></a>

    <span class="nav-label">Main menu</span>
    <nav class="nav flex-column">
      <a href="/admin/dashboard.html" class="nav-link"><i class="bi bi-grid-fill"></i> Dashboard</a>
      <a href="/admin/order-management.html" class="nav-link"><i class="bi bi-cart"></i> Order Management</a>
      <a href="/admin/customers.html" class="nav-link"><i class="bi bi-people"></i> Customers</a>
      <a href="/admin/coupon.html" class="nav-link"><i class="bi bi-ticket-perforated"></i> Coupon Code</a>
      <a href="/admin/categories.html" class="nav-link"><i class="bi bi-tags"></i> Categories</a>
      <a href="/admin/transaction.html" class="nav-link"><i class="bi bi-wallet2"></i> Transaction</a>
      <a href="/admin/brand.html" class="nav-link"><i class="bi bi-award"></i> Brand</a>
      <a href="/admin/sales-offers.html" class="nav-link"><i class="bi bi-percent"></i> Sales & Offers</a>
    </nav>

    <span class="nav-label">Product</span>
    <nav class="nav flex-column">
      <a href="/admin/add-product.html" class="nav-link"><i class="bi bi-plus-circle"></i> Add Products</a>
      <a href="/admin/all-products.html" class="nav-link active"><i class="bi bi-list-ul"></i> Product List</a>
    </nav>

      <a href="#" class="nav-link mt-3 text-danger" id="admin-logout"><i class="bi bi-box-arrow-right"></i>
        Logout</a>
    </nav>

    <div class="mt-auto pt-4">
      <div class="d-flex align-items-center p-3 rounded bg-light">
        <div class="bg-dark text-white rounded-circle d-flex align-items-center justify-content-center"
          style="width: 35px; height: 35px;" id="adminAvatar">A</div>
        <div class="ms-3">
          <h6 class="mb-0 fs-6" id="adminName">Loading...</h6>
          <small class="text-muted" style="font-size: 0.7rem;">Admin</small>
        </div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="fw-bold m-0">Product List</h4>
      <a href="add-product.html" class="btn btn-dark"><i class="bi bi-plus-lg"></i> Add New Product</a>
    </div>

    <div class="card border-0 shadow-sm">
      <div class="card-body">
        <div class="row mb-4">
          <div class="col-md-4">
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-search"></i></span>
              <input type="text" id="productSearchInput" class="form-control border-start-0 ps-0"
                placeholder="Search by name, SKU or category...">
            </div>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table align-middle table-hover">
            <thead class="table-light">
              <tr>
                <th>Product Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="adminProductsTable">
            </tbody>
          </table>
        </div>
      </div>
      <div class="card-footer bg-white border-top-0 pb-4">
        <nav aria-label="Product pagination">
          <ul class="pagination justify-content-center mb-0" id="productPagination">
          </ul>
        </nav>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/admin/js/admin-sidebar.js"></script>

  <script>
    let currentPage = 1;
    let currentSearch = "";

    function debounce(func, delay) {
      let timeout;
      return function (...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), delay);
      };
    }

    async function checkAdminAuth() {
      return await Auth.checkBackendAccess("admin");
    }

    document.getElementById("admin-logout").addEventListener("click", async (e) => {
      e.preventDefault();
      Auth.logout();
    });

    async function loadAdminProducts(page = 1, search = "") {
      currentPage = page;
      currentSearch = search;
      try {
        const res = await Auth.fetch(`/api/admin/products?page=${page}&search=${encodeURIComponent(search)}`);

        if (!res.ok) {
          Swal.fire({
            icon: "error",
            title: "Error",
            text: "Failed to load products",
            confirmButtonColor: "#d33"
          });
          return;
        }

        const data = await res.json();
        const products = data.products;
        const tbody = document.getElementById("adminProductsTable");
        tbody.innerHTML = "";

        if (products.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-muted">No products found</td></tr>`;
          renderPagination(0, 0);
          return;
        }

        products.forEach(product => {
          const image = product.images?.[0] || "/uploads/default.png";
          const row = document.createElement("tr");

          row.innerHTML = `
            <td>
              <div class="d-flex align-items-center">
                <img src="${image}" class="table-img me-3">
                <div>
                  <h6 class="mb-0 fw-bold">${product.name}</h6>
                  <small class="text-muted">SKU: ${product.sku || 'N/A'}</small>
                </div>
              </div>
            </td>
            <td>${product.category}</td>
            <td>₹${product.price.toLocaleString("en-IN")}</td>
            <td>${product.stock}</td>
            <td>
              <span class="badge bg-${product.isActive === false ? 'danger' : 'success'}">
                ${product.isActive === false ? 'Inactive' : 'Active'}
              </span>
            </td>
            <td>
              <button class="btn btn-sm btn-light" onclick="editProduct('${product._id}')">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-sm btn-light text-warning" onclick="toggleProduct('${product._id}')">
                <i class="bi bi-power"></i>
              </button>
              <button class="btn btn-sm btn-light text-danger" onclick="deleteProduct('${product._id}')">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          `;
          tbody.appendChild(row);
        });

        renderPagination(data.pages, data.page);

      } catch (err) {
        console.error(err);
      }
    }

    function renderPagination(totalPages, activePage) {
      const pagination = document.getElementById("productPagination");
      pagination.innerHTML = "";

      if (totalPages <= 1) return;

      // Previous button
      const prevLi = document.createElement("li");
      prevLi.className = `page-item ${activePage === 1 ? 'disabled' : ''}`;
      prevLi.innerHTML = `<a class="page-link" href="#">Previous</a>`;
      prevLi.onclick = (e) => {
        e.preventDefault();
        if (activePage > 1) loadAdminProducts(activePage - 1, currentSearch);
      };
      pagination.appendChild(prevLi);

      // Page numbers
      for (let i = 1; i <= totalPages; i++) {
        const li = document.createElement("li");
        li.className = `page-item ${i === activePage ? 'active' : ''}`;
        li.innerHTML = `<a class="page-link" href="#">${i}</a>`;
        li.onclick = (e) => {
          e.preventDefault();
          loadAdminProducts(i, currentSearch);
        };
        pagination.appendChild(li);
      }

      // Next button
      const nextLi = document.createElement("li");
      nextLi.className = `page-item ${activePage === totalPages ? 'disabled' : ''}`;
      nextLi.innerHTML = `<a class="page-link" href="#">Next</a>`;
      nextLi.onclick = (e) => {
        e.preventDefault();
        if (activePage < totalPages) loadAdminProducts(activePage + 1, currentSearch);
      };
      pagination.appendChild(nextLi);
    }

    const handleSearch = debounce((e) => {
      loadAdminProducts(1, e.target.value);
    }, 400);

    document.getElementById("productSearchInput").addEventListener("input", handleSearch);

    async function deleteProduct(id) {
      Swal.fire({
        title: "Delete this product?",
        text: "This action cannot be undone.",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#d33",
        cancelButtonColor: "#6c757d",
        confirmButtonText: "Yes, delete it"
      }).then(async (result) => {
        if (result.isConfirmed) {
          try {
            const res = await Auth.fetch(`/api/admin/products/${id}`, { method: "DELETE" });
            if (!res.ok) throw new Error("Delete failed");
            Swal.fire("Deleted!", "Product has been deleted.", "success");
            loadAdminProducts(currentPage, currentSearch);
          } catch (err) {
            Swal.fire("Error", err.message, "error");
          }
        }
      });
    }

    async function toggleProduct(id) {
      try {
        const res = await Auth.fetch(`/api/admin/products/${id}/toggle`, { method: "PATCH" });
        if (!res.ok) throw new Error("Failed to update status");
        Swal.fire("Updated", "Product status updated successfully", "success");
        loadAdminProducts(currentPage, currentSearch);
      } catch (err) {
        Swal.fire("Error", err.message, "error");
      }
    }

    function editProduct(id) {
      window.location.href = `/admin/add-product.html?id=${id}`;
    }

    checkAdminAuth().then((isAuth) => {
      if (isAuth) loadAdminProducts();
    });
  </script>
  </script>

</body>

</html>
