<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroWatch - Login</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --font-family: 'Outfit', sans-serif;
            --primary-color: #000000;
        }

        body {
            font-family: var(--font-family);
            height: 100vh;
            overflow: hidden;
        }

        .split-screen {
            display: flex;
            height: 100%;
        }

        .left-pane {
            flex: 1;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .right-pane {
            flex: 1;
            background: #fcfcfc;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px;
        }

        .logo {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -2px;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
        }

        .login-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .form-control {
            padding: 15px;
            background: #fff;
            border: 1px solid #ddd;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .btn-dark-custom {
            background-color: var(--primary-color);
            color: #fff;
            padding: 15px;
            border-radius: 5px;
            font-weight: 600;
            text-transform: uppercase;
            width: 100%;
            border: none;
        }

        .btn-dark-custom:hover {
            background: #333;
        }

        @media (max-width: 768px) {
            .split-screen {
                flex-direction: column;
                overflow-y: auto;
            }

            .left-pane {
                padding: 50px 0;
            }

            .logo {
                font-size: 2.5rem;
            }
        }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

    <div class="split-screen">
        <div class="left-pane">
            <img src="../common/images/logo.png" alt="AeroWatch" class="logo" style="max-height: 120px;">
        </div>
        <div class="right-pane">
            <div class="login-box">
                <h2 class="login-title">Login</h2>
                <form id="loginForm" novalidate>
                    <input type="email" id="email" name="email" class="form-control" placeholder="Email" maxlength="100"
                        required>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Password"
                        maxlength="50" required>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="keepLogged">
                            <label class="form-check-label small" for="keepLogged">
                                Keep me logged in
                            </label>
                        </div>
                        <a href="forgot-password.html" class="small text-decoration-none fw-bold">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-dark-custom mb-3">Email Login <span
                            class="float-end">&rarr;</span></button>

                    <!-- Google Sign-In Button -->
                    <div id="g_id_onload"
                        data-client_id="387563249973-b52mdftfupf603t9pch5k72umt87775i.apps.googleusercontent.com"
                        data-context="signin" data-ux_mode="popup" data-callback="handleGoogleLogin"
                        data-auto_prompt="false">
                    </div>

                    <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline"
                        data-text="signin_with" data-size="large" data-logo_alignment="left" data-width="400">
                    </div>

                    <div class="mt-4 text-center">
                        <small>Don't have an account? <a href="signup.html"
                                class="fw-bold text-dark text-decoration-none">Sign up</a></small>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        async function handleGoogleLogin(response) {
            try {
                const res = await fetch("/api/auth/google", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: response.credential })
                });

                const data = await res.json();

                if (!res.ok) {
                    Swal.fire({
                        icon: "error",
                        title: "Login Failed",
                        text: data.message || "Google login failed",
                        confirmButtonColor: "#000"
                    });
                    return;
                }

                localStorage.setItem("isLoggedIn", "true");
                window.location.href = "home.html";

            } catch (err) {
                console.error("Google login error:", err);
                Swal.fire({
                    icon: "error",
                    title: "Error",
                    text: "Something went wrong with Google Login",
                    confirmButtonColor: "#d33"
                });
            }
        }

        const form = document.getElementById("loginForm");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");

        // Proactive Email Input Control
        emailInput.addEventListener("input", () => {
            let value = emailInput.value;
            // Remove leading spaces
            value = value.replace(/^\s+/, "");
            // Block all spaces and force lowercase
            value = value.replace(/\s/g, "").toLowerCase();

            if (emailInput.value !== value) {
                emailInput.value = value;
            }
        });

        // Proactive Password Input Control
        passwordInput.addEventListener("input", () => {
            let value = passwordInput.value;
            // Trim leading spaces only (passwords can have trailing spaces, but user asked to prevent only-space passwords)
            value = value.replace(/^\s+/, "");

            if (passwordInput.value !== value) {
                passwordInput.value = value;
            }
        });

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            // 1. Get values correctly
            const emailValue = emailInput.value.trim().toLowerCase();
            const passwordValue = passwordInput.value;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            // 2. Email Validation Logic
            if (!emailValue) {
                Swal.fire({
                    icon: "warning",
                    title: "Missing Info",
                    text: "Email is required.",
                    confirmButtonColor: "#f59e0b"
                });
                return;
            }

            if (!emailRegex.test(emailValue)) {
                Swal.fire({
                    icon: "warning",
                    title: "Invalid Email",
                    text: "Please enter a valid email address.",
                    confirmButtonColor: "#f59e0b"
                });
                return;
            }

            // 3. Password Validation Logic
            // Trim password to check if it's only spaces (as requested)
            if (!passwordValue || passwordValue.trim().length === 0) {
                Swal.fire({
                    icon: "warning",
                    title: "Missing Info",
                    text: "Password is required.",
                    confirmButtonColor: "#f59e0b"
                });
                return;
            }

            if (passwordValue.length < 6) {
                Swal.fire({
                    icon: "warning",
                    title: "Warning",
                    text: "Password must be at least 6 characters.",
                    confirmButtonColor: "#f59e0b"
                });
                return;
            }

            // 4. Continue existing fetch request
            const email = emailValue;
            const password = passwordValue;

            try {
                const res = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",   // 🔥 VERY IMPORTANT
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    Swal.fire({
                        icon: "error",
                        title: "Login Failed",
                        text: data.message || "Login failed",
                        confirmButtonColor: "#000"
                    });
                    return;
                }

                // optional local flag (not required for auth)
                localStorage.setItem("isLoggedIn", "true");

                if (data.role === "admin") {
                    window.location.href = "/admin/dashboard.html";
                } else {
                    window.location.href = "/user/account.html";
                }

            } catch (err) {
                console.error("Login error:", err);
                Swal.fire({
                    icon: "error",
                    title: "Error",
                    text: "Something went wrong",
                    confirmButtonColor: "#d33"
                });
            }
        });
    </script>



`n</body>

</html>
