<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AeroWatch - Forgot Password</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background-color: #f8f9fa;
    }

    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-box {
      max-width: 400px;
      background: #fff;
      padding: 50px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      text-align: center;
    }

    .form-control {
      padding: 15px;
      margin-bottom: 20px;
    }

    .btn-dark-custom {
      background: #000;
      color: #fff;
      padding: 15px;
      width: 100%;
      border: none;
    }
  </style>
</head>

<body>

  <div class="auth-container">
    <div class="auth-box">
      <h2 class="auth-title">Forgot Password?</h2>
      <p class="text-muted small mb-4">
        Enter your email address and we’ll send you an OTP.
      </p>

      <form id="forgotForm">
        <input type="email" id="email" class="form-control" placeholder="Enter your email" required />
        <button type="submit" class="btn btn-dark-custom">
          Send OTP
        </button>
      </form>


      <div class="mt-4">
        <a href="login.html" class="text-muted small text-decoration-none">Back to Login</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("forgotForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();

      if (!email) {
        Swal.fire({
          icon: "warning",
          title: "Warning",
          text: "Email required",
          confirmButtonColor: "#f59e0b"
        });
        return;
      }

      try {
        const res = await fetch("/api/auth/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (!res.ok) {
          Swal.fire({
            icon: "error",
            title: "Error",
            text: data.message || "Failed to send OTP",
            confirmButtonColor: "#d33"
          });
          return;
        }

        // ✅ SAVE EMAIL FOR RESET STEP
        localStorage.setItem("resetEmail", email);

        Swal.fire({
          icon: "success",
          title: "OTP Sent",
          text: "OTP sent to your email",
          confirmButtonColor: "#000"
        }).then(() => {
          window.location.href = "reset-password.html";
        });

      } catch (err) {
        console.error(err);
        Swal.fire({
          icon: "error",
          title: "Error",
          text: "Server error",
          confirmButtonColor: "#d33"
        });
      }
    });
  </script>



`n    <script src="/js/auth.js"></script>
</body>

</html>
