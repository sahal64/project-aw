<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroWatch - Order Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --font-family: 'Outfit', sans-serif;
            --sidebar-width: 260px;
        }

        body {
            font-family: var(--font-family);
            background-color: #f8f9fa;
        }

        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: #fff;
            border-right: 1px solid #eee;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 40px;
            display: block;
            color: #000;
            text-decoration: none;
        }

        .nav-label {
            font-size: 0.8rem;
            color: #999;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 10px;
            margin-top: 20px;
            display: block;
        }

        .nav-link {
            color: #6c757d;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }

        .nav-link i {
            margin-right: 10px;
            font-size: 1.1rem;
        }

        .nav-link:hover,
        .nav-link.active {
            background-color: #000;
            color: #fff;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 30px;
        }

        .status-badge {
            font-weight: 500;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .pagination .page-link {
            color: #000;
            border-color: #eee;
        }

        .pagination .page-item.active .page-link {
            background-color: #000;
            border-color: #000;
            color: #fff;
        }

        #customDateRange {
            display: none;
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <a href="/admin/dashboard.html" class="sidebar-brand"><img src="../common/images/logo.png" alt="AeroWatch"
                style="max-height: 50px;"></a>

        <span class="nav-label">Main menu</span>
        <nav class="nav flex-column">
            <a href="/admin/dashboard.html" class="nav-link"><i class="bi bi-grid-fill"></i> Dashboard</a>
            <a href="/admin/order-management.html" class="nav-link active"><i class="bi bi-cart"></i> Order
                Management</a>
            <a href="/admin/customers.html" class="nav-link"><i class="bi bi-people"></i> Customers</a>
            <a href="/admin/coupon.html" class="nav-link"><i class="bi bi-ticket-perforated"></i> Coupon Code</a>
            <a href="/admin/categories.html" class="nav-link"><i class="bi bi-tags"></i> Categories</a>
            <a href="/admin/transaction.html" class="nav-link"><i class="bi bi-wallet2"></i> Transaction</a>
            <a href="/admin/brand.html" class="nav-link"><i class="bi bi-award"></i> Brand</a>
            <a href="/admin/sales-offers.html" class="nav-link"><i class="bi bi-percent"></i> Sales & Offers</a>
        </nav>

        <span class="nav-label">Product</span>
        <nav class="nav flex-column">
            <a href="/admin/add-product.html" class="nav-link"><i class="bi bi-plus-circle"></i> Add Products</a>
            <a href="/admin/all-products.html" class="nav-link"><i class="bi bi-list-ul"></i> Product List</a>
        </nav>

        <span class="nav-label">Admin</span>
        <nav class="nav flex-column">
            <a href="/admin/admin-role.html" class="nav-link"><i class="bi bi-shield-lock"></i> Admin Role</a>
            <a href="#" class="nav-link mt-3 text-danger" id="admin-logout"><i class="bi bi-box-arrow-right"></i>
                Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="d-flex flex-column mb-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="fw-bold m-0">Order Management</h4>
                <div class="d-flex gap-2">
                    <div class="input-group" style="width: 300px;">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" id="searchInput" class="form-control border-start-0 shadow-none"
                            placeholder="Search order ID or customer...">
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-end gap-2 align-items-center">
                <select id="statusFilter" class="form-select shadow-none" style="width: 151px;">
                    <option value="all">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="processing">Processing</option>
                    <option value="shipped">Shipped</option>
                    <option value="delivered">Delivered</option>
                    <option value="cancelled">Cancelled</option>
                </select>

                <select id="dateFilter" class="form-select shadow-none" style="width: 151px;">
                    <option value="all">All Time</option>
                    <option value="today">Today</option>
                    <option value="last7days">Last 7 Days</option>
                    <option value="last30days">Last 30 Days</option>
                    <option value="thisMonth">This Month</option>
                    <option value="lastMonth">Last Month</option>
                    <option value="custom">Custom Range</option>
                </select>
            </div>

            <div id="customDateRange" class="col-md-5 align-self-end mt-2">
                <div class="d-flex gap-2 align-items-center">
                    <input type="date" id="customStartDate" class="form-control form-control-sm">
                    <span class="text-muted small">to</span>
                    <input type="date" id="customEndDate" class="form-control form-control-sm">
                    <button class="btn btn-dark btn-sm px-3" onclick="applyCustomDate()">Apply</button>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table align-middle table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Order ID</th>
                                <th>Customer Name</th>
                                <th>Date</th>
                                <th>Total</th>
                                <th>Status</th>
                                <th class="pe-4 text-end">Action</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTableBody">
                            <tr>
                                <td colspan="6" class="text-center py-5">Loading orders...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="mt-4 d-flex justify-content-between align-items-center">
            <div class="text-muted small">
                Showing <span id="showingCount">0</span> of <span id="totalCount">0</span> orders
            </div>
            <nav id="paginationContainer" aria-label="Order pagination">
                <!-- Pagination buttons will be rendered here -->
            </nav>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        // Pagination State
        let currentPage = 1;
        const limit = 10;
        let currentSearch = "";
        let currentStatus = "all";
        let currentDateFilter = "all";
        let customStart = "";
        let customEnd = "";

        // Fetch Orders
        async function fetchOrders(page = 1) {
            try {
                currentPage = page;
                const url = `/api/orders/admin/all?page=${page}&limit=${limit}&search=${currentSearch}&status=${currentStatus}&dateFilter=${currentDateFilter}&startDate=${customStart}&endDate=${customEnd}`;

                console.log("Fetching orders from:", url);

                const response = await Auth.fetch(url, {
                    method: "GET"
                });

                console.log("Response status:", response.status);

                if (response.status === 401) {
                    Swal.fire("Session expired", "Please login again", "warning");
                    window.location.href = "/admin/login.html";
                    return;
                }

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'Failed to fetch orders');
                }

                const data = await response.json();
                console.log("Orders API response:", data);

                renderOrders(data.orders);
                renderPagination(data.totalPages, data.currentPage);

                document.getElementById("showingCount").innerText = data.orders.length;
                document.getElementById("totalCount").innerText = data.totalOrders;
            } catch (error) {
                console.error(error);
                Swal.fire({
                    icon: "error",
                    title: "Error",
                    text: error.message || "Error loading orders.",
                    confirmButtonColor: "#d33"
                });
                document.getElementById('ordersTableBody').innerHTML = `<tr><td colspan="6" class="text-center text-danger">Error loading orders.</td></tr>`;
            }
        }

        function renderPagination(totalPages, currentPage) {
            const paginationContainer = document.getElementById('paginationContainer');
            if (totalPages <= 1) {
                paginationContainer.innerHTML = '';
                return;
            }

            let html = '<ul class="pagination pagination-sm mb-0">';

            // Prev
            html += `
                <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="fetchOrders(${currentPage - 1}); return false;"><i class="bi bi-chevron-left"></i></a>
                </li>
            `;

            // Page Numbers
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += `
                        <li class="page-item ${i === currentPage ? 'active' : ''}">
                            <a class="page-link" href="#" onclick="fetchOrders(${i}); return false;">${i}</a>
                        </li>
                    `;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
                }
            }

            // Next
            html += `
                <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="fetchOrders(${currentPage + 1}); return false;"><i class="bi bi-chevron-right"></i></a>
                </li>
            `;

            html += '</ul>';
            paginationContainer.innerHTML = html;
        }

        function renderOrders(orders) {
            const tbody = document.getElementById('ordersTableBody');
            tbody.innerHTML = '';

            if (orders.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-5 text-muted">No orders found.</td></tr>`;
                return;
            }

            orders.forEach(order => {
                const date = new Date(order.createdAt).toLocaleDateString('en-GB', {
                    day: '2-digit', month: 'short', year: 'numeric'
                });

                const customerName = order.address ? `${order.address.firstName} ${order.address.lastName}` : (order.user?.name || 'Unknown');

                let statusBadgeClass = 'bg-secondary text-white';
                if (order.orderStatus === 'Placed') statusBadgeClass = 'bg-info text-dark';
                else if (order.orderStatus === 'Processing') statusBadgeClass = 'bg-warning text-dark';
                else if (order.orderStatus === 'Delivered') statusBadgeClass = 'bg-success text-white';
                else if (order.orderStatus === 'Cancelled') statusBadgeClass = 'bg-danger text-white';

                const tr = document.createElement('tr');
                let returnInfo = "";
                if (order.returnRequest && order.returnRequest.status === 'requested') {
                    statusBadgeClass = 'bg-info text-dark';
                    returnInfo = ` <div class="mt-1 small text-muted">Reason: ${order.returnRequest.reason}</div>`;
                }

                let actionsHtml = `
                    <a href="/admin/order-details.html?id=${order._id}" class="btn btn-sm btn-outline-dark" title="View Details"><i class="bi bi-eye"></i></a>
                `;

                if (order.returnRequest && order.returnRequest.status === 'requested') {
                    actionsHtml += `
                        <button class="btn btn-sm btn-success approve-return ms-1" onclick="approveReturn('${order._id}')" title="Approve Return">
                            ✔
                        </button>
                        <button class="btn btn-sm btn-danger reject-return ms-1" onclick="rejectReturn('${order._id}')" title="Reject Return">
                            ❌
                        </button>
                    `;
                } else {
                    actionsHtml += `
                        <button class="btn btn-sm btn-outline-danger ms-1" onclick="deleteOrder('${order._id}')" title="Delete Order">
                            <i class="bi bi-trash"></i>
                        </button>
                    `;
                }

                tr.innerHTML = `
                    <td class="ps-4 fw-medium">${order.orderNumber || order._id.substring(0, 8)}</td>
                    <td>${customerName}</td>
                    <td>${date}</td>
                    <td class="fw-bold fs-6">₹${order.totalAmount.toLocaleString('en-IN', { minimumFractionDigits: 2 })}</td>
                    <td>
                        <span class="status-badge ${
                            order.returnRequest && order.returnRequest.status === 'approved' ? 'bg-success text-white' : statusBadgeClass
                        }">${
                            order.returnRequest && order.returnRequest.status === 'requested' ? 'Return Requested' : 
                            (order.returnRequest && order.returnRequest.status === 'approved' ? 'Returned' : order.orderStatus)
                        }</span>
                        ${returnInfo}
                    </td>
                    <td class="pe-4 text-end">
                        ${actionsHtml}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Search Validation: Letters, numbers, spaces, hyphens, @
        let searchTimeout;
        document.getElementById("searchInput").addEventListener("input", (e) => {
            let originalVal = e.target.value;
            // Instantly remove invalid characters (allow hyphens for Order IDs like AW-...)
            let sanitizedVal = originalVal.replace(/[^A-Za-z0-9@\-\s]/g, '');
            
            if (originalVal !== sanitizedVal) {
                e.target.value = sanitizedVal;
            }

            const val = sanitizedVal.trim();

            if (val.length > 50) {
                e.target.value = val.substring(0, 50);
                return;
            }

            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentSearch = val;
                fetchOrders(1);
            }, 500);
        });

        async function deleteOrder(id) {
            const result = await Swal.fire({
                title: 'Delete this order?',
                text: "This action cannot be undone. You can only delete cancelled orders.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Yes, delete it!'
            });

            if (result.isConfirmed) {
                try {
                    const response = await Auth.fetch(`/api/admin/orders/${id}`, {
                        method: 'DELETE'
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.message || 'Failed to delete order');
                    }

                    Swal.fire(
                        'Deleted!',
                        'The order has been removed from the list.',
                        'success'
                    );
                    fetchOrders(currentPage);
                } catch (error) {
                    Swal.fire(
                        'Error',
                        error.message,
                        'error'
                    );
                }
            }
        }

        // Status Filter Change
        document.getElementById("statusFilter").addEventListener("change", (e) => {
            currentStatus = e.target.value;
            fetchOrders(1);
        });

        // Date Filter Change
        document.getElementById("dateFilter").addEventListener("change", (e) => {
            currentDateFilter = e.target.value;
            const customDiv = document.getElementById("customDateRange");
            if (currentDateFilter === "custom") {
                customDiv.style.display = "block";
            } else {
                customDiv.style.display = "none";
                fetchOrders(1);
            }
        });

        function applyCustomDate() {
            customStart = document.getElementById("customStartDate").value;
            customEnd = document.getElementById("customEndDate").value;

            if (!customStart || !customEnd) {
                return Swal.fire("Error", "Please select both start and end dates", "warning");
            }

            if (new Date(customStart) > new Date(customEnd)) {
                return Swal.fire("Error", "Start date cannot be after end date", "warning");
            }

            fetchOrders(1);
        }

        async function approveReturn(id) {
            const result = await Swal.fire({
                title: 'Approve Return?',
                text: "This will mark the return as approved and refund the amount to user's wallet.",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#198754',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Yes, Approve'
            });

            if (result.isConfirmed) {
                try {
                    const response = await Auth.fetch(`/api/admin/orders/${id}/return/approve`, {
                        method: 'PUT'
                    });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.message || 'Approval failed');
                    Swal.fire('Success', 'Return approved and amount refunded.', 'success');
                    fetchOrders(currentPage);
                } catch (error) {
                    Swal.fire('Error', error.message, 'error');
                }
            }
        }

        async function rejectReturn(id) {
            const result = await Swal.fire({
                title: 'Reject Return?',
                text: "This will mark the return request as rejected.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc3545',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Yes, Reject'
            });

            if (result.isConfirmed) {
                try {
                    const response = await Auth.fetch(`/api/admin/orders/${id}/return/reject`, {
                        method: 'PUT'
                    });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.message || 'Rejection failed');
                    Swal.fire('Success', 'Return request rejected.', 'success');
                    fetchOrders(currentPage);
                } catch (error) {
                    Swal.fire('Error', error.message, 'error');
                }
            }
        }

        // Initialize
        Auth.checkBackendAccess("admin").then((isAuth) => {
            if (isAuth) fetchOrders(1);
        });

        document.getElementById("admin-logout").addEventListener("click", async (e) => {
            e.preventDefault();
            Auth.logout();
        });
    </script>
</body>

</html>
